<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackston Tools</title>
  <link rel="icon" type="image/jpeg" href="https://yt3.googleusercontent.com/sf1r8tdjxffb9ufYtpNOwK7JokYbPw_aL52V80_7cn41SEJxQXGvD3FlqbVgE1wqWU4k_x5EHg=s176-c-k-c0x00ffffff-no-rj-mo" />
  <meta property="og:title" content="JACKSTONS TOOLS IG" />
  <meta property="og:description" content="yeah ig" />
  <meta property="og:image" content="https://yt3.googleusercontent.com/sf1r8tdjxffb9ufYtpNOwK7JokYbPw_aL52V80_7cn41SEJxQXGvD3FlqbVgE1wqWU4k_x5EHg=s176-c-k-c0x00ffffff-no-rj-mo" />
  <meta property="og:url" content="https://tools.jackston.net" />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #151320;
      --surface:   #1e1b2e;
      --surface2:  #272440;
      --surface3:  #302d4e;
      --border:    #3a3560;
      --border2:   #504b7a;
      --lav:       #b8a9e0;
      --lav2:      #d4caef;
      --muted:     #6e6898;
      --muted2:    #9590bb;
      --text:      #e8e2f5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100vh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 100px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.16;
    }

    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #7c5fc9 0%, #3d2b8a 60%, transparent 100%);
      top: -160px; left: -100px;
      animation: drift1 22s ease-in-out infinite;
    }
    .orb-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #c084e8 0%, #8b3fba 60%, transparent 100%);
      top: 40%; right: -100px;
      animation: drift2 28s ease-in-out infinite;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #5b4fcf 0%, #2e2070 60%, transparent 100%);
      bottom: 10%; left: 10%;
      animation: drift3 34s ease-in-out infinite;
    }
    .orb-4 {
      width: 220px; height: 220px;
      background: radial-gradient(circle, #b07dd4 0%, #6b35a8 60%, transparent 100%);
      top: 30%; left: 35%;
      animation: drift4 18s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(50px,-40px) scale(1.06); }
      66%      { transform: translate(20px,60px) scale(0.94); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(-40px,50px) scale(1.08); }
      70%      { transform: translate(-20px,-30px) scale(0.96); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(60px,-50px) scale(1.1); }
    }
    @keyframes drift4 {
      0%,100% { transform: translate(0,0) scale(1); }
      25%      { transform: translate(30px,40px) scale(1.04); }
      75%      { transform: translate(-30px,-20px) scale(0.97); }
    }

    .bg-grid {
      position: fixed;
      inset: -60px;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(180,160,220,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,160,220,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-scroll 8s linear infinite;
    }

    @keyframes grid-scroll {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── CONTENT WRAPPER ── */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 56px;
      animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
    }

    .pfp-wrap { position: relative; }

    .pfp-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(#b8a9e0, #7c5fc9, #c084e8, #b8a9e0);
      animation: ring-pulse 3s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(184,169,224,0.2), 0 0 30px rgba(124,95,201,0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(184,169,224,0.06), 0 0 50px rgba(124,95,201,0.25); }
    }

    .pfp-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    .status-dot {
      position: absolute;
      bottom: 5px; right: 5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #5cb85c;
      border: 3px solid var(--bg);
      box-shadow: 0 0 8px rgba(92,184,92,0.5);
    }

    .header-text { text-align: center; }

    h1 {
      font-family: 'Lilita One', sans-serif;
      font-weight: 400;
      font-size: clamp(2.2rem, 7vw, 3rem);
      color: var(--lav2);
      letter-spacing: 0.3px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .tagline::before,
    .tagline::after {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: var(--muted);
      opacity: 0.35;
    }

    /* ── SECTION LABELS ── */
    .section-label {
      font-family: 'Lilita One', sans-serif;
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      width: 100%;
      margin-bottom: 14px;
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── CARDS ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px 20px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color .25s, transform .22s cubic-bezier(.22,1,.36,1), background .25s;
    }

    /* shimmer */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transform: skewX(-20deg);
      transition: left .55s ease;
    }

    .card:hover::after { left: 160%; }

    .card:hover {
      background: var(--surface2);
      border-color: var(--border2);
      transform: translateY(-3px);
    }

    .card:active { transform: translateY(-1px); }

    /* ── ICON ── */
    .card-icon {
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--border);
      transition: border-color .25s, transform .2s;
    }

    .card:hover .card-icon {
      border-color: var(--border2);
      transform: scale(1.07);
    }

    .card-icon svg { width: 26px; height: 26px; }

    /* ── TEXT ── */
    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-family: 'Lilita One', sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      color: var(--lav2);
      line-height: 1.2;
    }

    .card-sub {
      font-size: 0.8rem;
      color: var(--muted2);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── BADGE ── */
    .badge {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(184,169,224,0.1);
      color: var(--lav);
      border: 1px solid rgba(184,169,224,0.2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── ARROW ── */
    .card-arrow {
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      transition: transform .2s, color .2s;
    }

    .card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--lav);
    }

    /* ── COPY BUTTON ── */
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--muted2);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, color .2s, border-color .2s, transform .15s;
      font-family: 'Nunito', sans-serif;
    }

    .copy-btn:hover {
      background: var(--surface2);
      color: var(--lav2);
      border-color: var(--border2);
    }

    .copy-btn:active { transform: scale(0.95); }

    .copy-btn.copied {
      color: #5cb85c;
      border-color: rgba(92,184,92,0.3);
      background: rgba(92,184,92,0.08);
    }

    .copy-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      margin-top: 72px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      animation: fadeUp .4s .65s cubic-bezier(.22,1,.36,1) both;
    }

    footer span {
      display: inline-block;
      padding: 8px 22px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--surface);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim-1 { animation: fadeUp .5s .15s cubic-bezier(.22,1,.36,1) both; }
    .anim-2 { animation: fadeUp .5s .25s cubic-bezier(.22,1,.36,1) both; }
    .anim-3 { animation: fadeUp .5s .35s cubic-bezier(.22,1,.36,1) both; }
    .anim-4 { animation: fadeUp .5s .42s cubic-bezier(.22,1,.36,1) both; }
    .anim-5 { animation: fadeUp .5s .49s cubic-bezier(.22,1,.36,1) both; }
    .anim-6 { animation: fadeUp .5s .56s cubic-bezier(.22,1,.36,1) both; }
  </style>
</head>
<body>

    <p class="section-label anim-3">Connections</p>
    <div class="cards">

      <!-- TikTok -->

  <script>
    function copyDiscord() {
      navigator.clipboard.writeText('j4ckst0n').then(() => {
        const btn   = document.getElementById('copy-btn');
        const label = document.getElementById('copy-label');
        const icon  = document.getElementById('copy-icon');
        btn.classList.add('copied');
        label.textContent = 'Copied!';
        icon.innerHTML = '<path d="M2.5 8L6 11.5L13.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
        setTimeout(() => {
          btn.classList.remove('copied');
          label.textContent = 'Copy';
          icon.innerHTML = '<rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
        }, 2200);
      });
    }
  </script>
